services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-exalore_erp}
      POSTGRES_USER: ${POSTGRES_USER:-exalore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-exalore}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-exalore} -d ${POSTGRES_DB:-exalore_erp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-local-docker-development-key}
      DJANGO_DEBUG: "true"
      DJANGO_SERVE_MEDIA: "true"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DATABASE_URL: postgresql://${POSTGRES_USER:-exalore}:${POSTGRES_PASSWORD:-exalore}@db:5432/${POSTGRES_DB:-exalore_erp}
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media

volumes:
  postgres_data:
  media_data:
